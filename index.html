<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Request Tracker</title>

</head>
<body>
<header>
    <span>Request Tracker</span>
    <span id="header-count">0 requests</span>
</header>

<div class="main-layout">
    <aside>
        <h2>Submit a request</h2>

        <form id="request-form" novalidate>
            <label for="name">Full name</label>
            <input type="text" id="name" placeholder="John Doe">

            <label for="Email">Email Address</label>
            <input type="email" id="Email" placeholder="John@example.com">

            <label for="Product">Product / Company</label>
            <select id="Product">
                <option value="">Select one...</option>
                <option value="Acme Corp">Acme Corp</option>
                <option value="Globex">Globex</option>
                <option value="Initech">Initech</option>
                <option value="Umbrella Ltd">Umbrella Ltd</option>
                <option value="Soylent Co">Soylent Co</option>
            </select>

            <label for="request-type">Request Type</label>
            <select id="request-type">
                <option value="">Select</option>
                <option value="Bug">Bug</option>
                <option value="Feature Request">Feature Request</option>
                <option value="General FeedBack">General FeedBack</option>
                <option value=Partnership"">Partnership</option>
                <option value="Other">Other</option>
            </select>

            <p>Priority</p>
            <label>
                <input type="radio" name="priority" value="Low" checked>Low
            </label>
            <label>
                <input type="radio" name="priority" value="Medium">Medium
            </label>
            <label>
                <input type="radio" name="priority" value="High">High
            </label>

            <label for="message">Message</label>
            <textarea id="message" placeholder="Describe your request"></textarea>

            <button type="submit">Submit request</button>

            <p id="success-msg" style="display: none;">Submitted!</p>

        </form>
    </aside>
    <!--Requests submitted will appear here-->
    <main>
        <h2>Requests</h2>
        <div class="filter-bar">
            <input type="text" id="search" placeholder="Search...">

            <select id="filter-status">
                <option value="">Statuses</option>
                <option value="New">New</option>
                <option value="In Review">In Review</option>
                <option value="Reslolved" >Resolved</option>
                <option value="Rejected">Rejected</option>
            </select>

            <p id="lists-stats">No requests yet!</p>
        </div>
        <div id="requests-list">
            <p>No requests yet. Submit one using the form</p>
        </div>
    </main>
</div>

<script src="app.js"></script>
</body>
</html>
